<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Waktu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green: #16a34a;
            --green-light: #dcfce7;
            --green-dim: rgba(22,163,74,0.12);
            --bg: #f6f7f9;
            --surface: #ffffff;
            --surface-2: #f0f2f5;
            --border: #e2e5ea;
            --text: #111827;
            --muted: #6b7280;
            --radius: 14px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.06);
        }

        body.dark {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-2: #1c2128;
            --border: #2d333b;
            --text: #e6edf3;
            --muted: #7d8590;
            --green-light: rgba(22,163,74,0.15);
            --green-dim: rgba(22,163,74,0.08);
            --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.3);
            color-scheme: dark;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            transition: background 0.3s, color 0.3s;
        }

        /* --- Background subtle pattern --- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 20% 20%, rgba(22,163,74,0.04) 0%, transparent 50%),
                              radial-gradient(circle at 80% 80%, rgba(22,163,74,0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 460px;
            padding: 32px 28px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* --- Header --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--green-dim);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--green);
        }

        .logo-icon svg { display: block; }

        .header-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .header-sub {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 1px;
            font-weight: 400;
        }

        /* --- Theme toggle --- */
        .theme-btn {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .theme-btn:hover { color: var(--text); border-color: var(--green); }
        .theme-btn #sunIcon { display: none; }
        .theme-btn #moonIcon { display: block; }
        body.dark .theme-btn #sunIcon { display: block; }
        body.dark .theme-btn #moonIcon { display: none; }

        /* --- Section label --- */
        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        /* --- Inputs --- */
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .field { display: flex; flex-direction: column; gap: 5px; }

        .field label {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--muted);
        }

        input[type="date"],
        input[type="time"],
        input[type="number"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 9px;
            font-size: 0.875rem;
            font-family: 'DM Mono', monospace;
            font-weight: 500;
            color: var(--text);
            background: var(--surface-2);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(22,163,74,0.12);
            background: var(--surface);
        }

        /* --- Divider --- */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .divider-line { flex: 1; height: 1px; background: var(--border); }
        .divider-label { font-size: 0.7rem; color: var(--muted); font-weight: 500; white-space: nowrap; }

        /* --- Toggle operation --- */
        .op-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 20px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
        }

        .op-toggle input[type="radio"] { display: none; }

        .op-toggle label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 7px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .op-toggle input:checked + label {
            background: var(--surface);
            color: var(--green);
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
        }

        .op-icon { font-size: 1rem; line-height: 1; }

        /* --- Duration grid --- */
        .duration-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        /* --- Calculate button --- */
        .btn-calc {
            width: 100%;
            padding: 12px;
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            letter-spacing: 0.01em;
        }

        .btn-calc:hover { opacity: 0.88; }
        .btn-calc:active { transform: scale(0.98); }

        /* --- Result --- */
        .result-box {
            margin-top: 16px;
            border: 1px solid var(--green-light);
            background: var(--green-dim);
            border-radius: 12px;
            padding: 18px 20px;
            display: none;
            animation: resultIn 0.35s ease both;
        }

        @keyframes resultIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .result-box.show { display: block; }

        .result-eyebrow {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--green);
            margin-bottom: 6px;
        }

        .result-date-val {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
        }

        .result-time-val {
            font-family: 'DM Mono', monospace;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--muted);
        }

        @media (max-width: 380px) {
            .row { grid-template-columns: 1fr; }
            .duration-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="card">

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
            </div>
            <div>
                <div class="header-title">Kalkulator Waktu</div>
                <div class="header-sub">Tambah atau kurangi durasi dari tanggal</div>
            </div>
        </div>
        <button class="theme-btn" id="themeToggle" aria-label="Toggle tema">
            <svg id="moonIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg id="sunIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
    </div>

    <!-- Start date/time -->
    <div class="section-label">Waktu Awal</div>
    <div class="row">
        <div class="field">
            <label for="startDate">Tanggal</label>
            <input type="date" id="startDate">
        </div>
        <div class="field">
            <label for="startTime">Waktu</label>
            <input type="time" id="startTime" step="1">
        </div>
    </div>

    <!-- Operation toggle -->
    <div class="section-label">Operasi</div>
    <div class="op-toggle">
        <input type="radio" id="opAdd" name="operation" value="add" checked>
        <label for="opAdd"><span class="op-icon">＋</span> Tambah</label>

        <input type="radio" id="opSub" name="operation" value="sub">
        <label for="opSub"><span class="op-icon">－</span> Kurang</label>
    </div>

    <!-- Duration -->
    <div class="section-label">Durasi</div>
    <div class="duration-grid">
        <div class="field">
            <label for="years">Tahun</label>
            <input type="number" id="years" placeholder="0" min="0">
        </div>
        <div class="field">
            <label for="months">Bulan</label>
            <input type="number" id="months" placeholder="0" min="0">
        </div>
        <div class="field">
            <label for="days">Hari</label>
            <input type="number" id="days" placeholder="0" min="0">
        </div>
        <div class="field">
            <label for="hours">Jam</label>
            <input type="number" id="hours" placeholder="0" min="0">
        </div>
        <div class="field">
            <label for="minutes">Menit</label>
            <input type="number" id="minutes" placeholder="0" min="0">
        </div>
        <div class="field">
            <label for="seconds">Detik</label>
            <input type="number" id="seconds" placeholder="0" min="0">
        </div>
    </div>

    <!-- Button -->
    <button class="btn-calc" onclick="calculateTime()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Hitung Hasil
    </button>

    <!-- Result -->
    <div class="result-box" id="resultBox">
        <div class="result-eyebrow">Hasil Perhitungan</div>
        <div class="result-date-val" id="resDate">—</div>
        <div class="result-time-val" id="resTime">—</div>
    </div>

</div>

<script>
    // Cookie helpers
    function setCookie(name, value, days) {
        let d = new Date();
        d.setTime(d.getTime() + days * 86400000);
        document.cookie = `${name}=${value||""}; expires=${d.toUTCString()}; path=/; SameSite=Lax`;
    }
    function getCookie(name) {
        for (let c of document.cookie.split(';')) {
            c = c.trim();
            if (c.startsWith(name + '=')) return c.slice(name.length + 1);
        }
        return null;
    }

    // Theme
    const body = document.body;
    const themeBtn = document.getElementById('themeToggle');
    if (getCookie('theme') === 'dark') body.classList.add('dark');
    themeBtn.addEventListener('click', () => {
        body.classList.toggle('dark');
        setCookie('theme', body.classList.contains('dark') ? 'dark' : 'light', 365);
    });

    // Default: now
    window.onload = () => {
        const now = new Date();
        const localDate = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
            .toISOString().split('T')[0];
        document.getElementById('startDate').value = localDate;
        const hh = now.getHours().toString().padStart(2,'0');
        const mm = now.getMinutes().toString().padStart(2,'0');
        const ss = now.getSeconds().toString().padStart(2,'0');
        document.getElementById('startTime').value = `${hh}:${mm}:${ss}`;
    };

    function calculateTime() {
        const startDate = document.getElementById('startDate').value;
        const startTime = document.getElementById('startTime').value;
        if (!startDate || !startTime) {
            alert('Pilih tanggal dan waktu mulai terlebih dahulu.');
            return;
        }

        const op = document.querySelector('input[name="operation"]:checked').value;
        const s = op === 'add' ? 1 : -1;
        const Y = parseInt(document.getElementById('years').value) || 0;
        const M = parseInt(document.getElementById('months').value) || 0;
        const D = parseInt(document.getElementById('days').value) || 0;
        const h = parseInt(document.getElementById('hours').value) || 0;
        const m = parseInt(document.getElementById('minutes').value) || 0;
        const sec = parseInt(document.getElementById('seconds').value) || 0;

        let t = startTime;
        if (t.split(':').length === 2) t += ':00';
        let d = new Date(`${startDate}T${t}`);

        d.setFullYear(d.getFullYear() + Y * s);
        d.setMonth(d.getMonth() + M * s);
        d.setDate(d.getDate() + D * s);
        d.setHours(d.getHours() + h * s);
        d.setMinutes(d.getMinutes() + m * s);
        d.setSeconds(d.getSeconds() + sec * s);

        const formattedDate = d.toLocaleDateString('id-ID', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        let rh = d.getHours();
        const ampm = rh >= 12 ? 'PM' : 'AM';
        rh = rh % 12 || 12;
        const formattedTime =
            `${rh.toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')} ${ampm}`;

        document.getElementById('resDate').textContent = formattedDate;
        document.getElementById('resTime').textContent = formattedTime;

        const box = document.getElementById('resultBox');
        box.classList.remove('show');
        void box.offsetWidth; // reflow for animation replay
        box.classList.add('show');
    }
</script>
</body>
</html>
