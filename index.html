<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Waktu & Tanggal</title>
    <style>
        /* Tambahkan box-sizing global agar padding tidak menambah ukuran lebar elemen */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --bg: #f3f4f6;
            --surface: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #d1d5db;
            --radius: 12px;
            --input-bg: #ffffff;
            --toggle-bg: #d1fae5;
            --result-bg: #f8fafc;
        }

        body.dark {
            --bg: #111827;
            --surface: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --border: #374151;
            --input-bg: #374151;
            --toggle-bg: #064e3b;
            --result-bg: #111827;
            color-scheme: dark;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--surface);
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            background: none;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            color: var(--text-main);
        }

        .theme-toggle:hover {
            background-color: var(--bg);
        }

        .theme-toggle #sunIcon { display: none; }
        .theme-toggle #moonIcon { display: block; }
        
        body.dark .theme-toggle #sunIcon { display: block; }
        body.dark .theme-toggle #moonIcon { display: none; }

        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 24px;
        }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        @media (max-width: 400px) {
            .form-row {
                flex-direction: column;
            }
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0; /* Mencegah flex item membesar lebih dari kontainer */
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            white-space: nowrap;
        }

        input[type="date"], 
        input[type="time"], 
        input[type="number"] {
            width: 100%; /* Memastikan input mengambil maksimal 100% dari kolomnya */
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
            color: var(--text-main);
            background-color: var(--input-bg);
        }

        input[type="date"]:focus, 
        input[type="time"]:focus, 
        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        .toggle-container {
            display: flex;
            background-color: var(--toggle-bg);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .toggle-container input[type="radio"] {
            display: none;
        }

        .toggle-container label {
            flex: 1;
            text-align: center;
            padding: 12px;
            margin: 0;
            cursor: pointer;
            font-weight: 600;
            color: var(--primary);
            transition: background-color 0.3s, color 0.3s;
        }

        .toggle-container input[type="radio"]:checked + label {
            background-color: var(--primary);
            color: white;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        /* Responsif untuk layar kecil agar grid menjadi 2 kolom */
        @media (max-width: 400px) {
            .grid-inputs {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        button.btn-calc {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button.btn-calc:hover {
            background-color: var(--primary-hover);
        }
        
        button.btn-calc:active {
            transform: scale(0.98);
        }

        .result-container {
            margin-top: 24px;
            padding: 20px;
            background-color: var(--result-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            display: none; /* Sembunyikan sepenuhnya sebelum dihitung */
        }

        .result-container.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .result-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .result-date {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .result-time {
            font-size: 1.125rem;
            color: var(--text-main);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <button id="themeToggle" class="theme-toggle" aria-label="Ubah Tema" title="Ubah Tema">
            <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="20" height="20" fill="currentColor"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M320 64C178.6 64 64 178.6 64 320C64 461.4 178.6 576 320 576C388.8 576 451.3 548.8 497.3 504.6C504.6 497.6 506.7 486.7 502.6 477.5C498.5 468.3 488.9 462.6 478.8 463.4C473.9 463.8 469 464 464 464C362.4 464 280 381.6 280 280C280 207.9 321.5 145.4 382.1 115.2C391.2 110.7 396.4 100.9 395.2 90.8C394 80.7 386.6 72.5 376.7 70.3C358.4 66.2 339.4 64 320 64z"/></svg>
            <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="20" height="20" fill="currentColor"><path d="M361.5 1.2c5 2.1 8.6 6.6 9.6 11.9L391 121l107.9 19.8c5.3 1 9.8 4.6 11.9 9.6s1.5 10.7-1.6 15.2L446.9 256l62.3 90.3c3.1 4.5 3.7 10.2 1.6 15.2s-6.6 8.6-11.9 9.6L391 391 371.1 498.9c-1 5.3-4.6 9.8-9.6 11.9s-10.7 1.5-15.2-1.6L256 446.9l-90.3 62.3c-4.5 3.1-10.2 3.7-15.2 1.6s-8.6-6.6-9.6-11.9L121 391 13.1 371.1c-5.3-1-9.8-4.6-11.9-9.6s-1.5-10.7 1.6-15.2L65.1 256 2.8 165.7c-3.1-4.5-3.7-10.2-1.6-15.2s6.6-8.6 11.9-9.6L121 121 140.9 13.1c1-5.3 4.6-9.8 9.6-11.9s10.7-1.5 15.2 1.6L256 65.1 346.3 2.8c4.5-3.1 10.2-3.7 15.2-1.6zM160 256a96 96 0 1 1 192 0 96 96 0 1 1 -192 0zm224 0a128 128 0 1 0 -256 0 128 128 0 1 0 256 0z"/></svg>
        </button>

        <h2>Kalkulator Waktu</h2>

        <div class="form-row">
            <div class="form-group">
                <label for="startDate">Tanggal Mulai</label>
                <input type="date" id="startDate" required>
            </div>
            <div class="form-group">
                <label for="startTime">Waktu Mulai</label>
                <input type="time" id="startTime" step="1" required>
            </div>
        </div>

        <div class="toggle-container">
            <input type="radio" id="opAdd" name="operation" value="add" checked>
            <label for="opAdd">Tambah (+)</label>
            
            <input type="radio" id="opSub" name="operation" value="sub">
            <label for="opSub">Kurang (-)</label>
        </div>

        <div class="grid-inputs">
            <div class="form-group">
                <label for="years">Tahun</label>
                <input type="number" id="years" placeholder="0" min="0">
            </div>
            <div class="form-group">
                <label for="months">Bulan</label>
                <input type="number" id="months" placeholder="0" min="0">
            </div>
            <div class="form-group">
                <label for="days">Hari</label>
                <input type="number" id="days" placeholder="0" min="0">
            </div>
            <div class="form-group">
                <label for="hours">Jam</label>
                <input type="number" id="hours" placeholder="0" min="0">
            </div>
            <div class="form-group">
                <label for="minutes">Menit</label>
                <input type="number" id="minutes" placeholder="0" min="0">
            </div>
            <div class="form-group">
                <label for="seconds">Detik</label>
                <input type="number" id="seconds" placeholder="0" min="0">
            </div>
        </div>

        <button class="btn-calc" onclick="calculateTime()">Hitung Hasil</button>

        <div class="result-container" id="resultContainer">
            <div class="result-label">Hasil Perhitungan</div>
            <div class="result-date" id="resDate">-</div>
            <div class="result-time" id="resTime">-</div>
        </div>
    </div>

    <script>
        // Fungsi helper untuk mengatur Cookie
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                let date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/; SameSite=Lax";
        }

        // Fungsi helper untuk mengambil nilai Cookie
        function getCookie(name) {
            let nameEQ = name + "=";
            let ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }

        // Setup Dark Mode Toggle
        const themeToggleBtn = document.getElementById('themeToggle');
        const body = document.body;

        // Cek preferensi user sebelumnya dari Cookie
        if (getCookie('theme') === 'dark') {
            body.classList.add('dark');
        }

        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');
            // Simpan preferensi tema ke cookie selama 365 hari
            setCookie('theme', isDark ? 'dark' : 'light', 365);
        });

        // Set default value ke waktu saat ini ketika halaman dimuat
        window.onload = () => {
            const now = new Date();
            // Format YYYY-MM-DD menyesuaikan zona waktu lokal
            const localDate = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            document.getElementById('startDate').value = localDate;
            
            // Format HH:MM:SS (Format 24 jam untuk input type="time" HTML5, browser yang konversi ke AM/PM di UI)
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('startTime').value = `${hours}:${minutes}:${seconds}`;
        };

        function calculateTime() {
            const startDate = document.getElementById('startDate').value;
            const startTime = document.getElementById('startTime').value;

            if (!startDate || !startTime) {
                alert('Silakan pilih tanggal dan waktu mulai terlebih dahulu!');
                return;
            }

            // Ambil operasi (Tambah atau Kurang)
            const operation = document.querySelector('input[name="operation"]:checked').value;
            const sign = operation === 'add' ? 1 : -1;

            // Ambil nilai input, set ke 0 jika kosong
            const years = parseInt(document.getElementById('years').value) || 0;
            const months = parseInt(document.getElementById('months').value) || 0;
            const days = parseInt(document.getElementById('days').value) || 0;
            const hours = parseInt(document.getElementById('hours').value) || 0;
            const minutes = parseInt(document.getElementById('minutes').value) || 0;
            const seconds = parseInt(document.getElementById('seconds').value) || 0;

            // Inisialisasi objek Date
            // Waktu dari input bisa dalam format HH:MM atau HH:MM:SS, kita pastikan parsing berjalan baik
            let startTimeValue = startTime;
            if (startTime.split(':').length === 2) {
                startTimeValue += ':00'; // Menambah detik jika browser hanya mengembalikan jam dan menit
            }
            let resultDate = new Date(`${startDate}T${startTimeValue}`);

            // Proses perhitungan matematika waktu
            resultDate.setFullYear(resultDate.getFullYear() + (years * sign));
            resultDate.setMonth(resultDate.getMonth() + (months * sign));
            resultDate.setDate(resultDate.getDate() + (days * sign));
            resultDate.setHours(resultDate.getHours() + (hours * sign));
            resultDate.setMinutes(resultDate.getMinutes() + (minutes * sign));
            resultDate.setSeconds(resultDate.getSeconds() + (seconds * sign));

            // Format output Tanggal (Bahasa Indonesia)
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = resultDate.toLocaleDateString('id-ID', dateOptions);

            // Format output Waktu (12-Jam AM/PM) dengan detik
            let resHours = resultDate.getHours();
            let resMinutes = resultDate.getMinutes();
            let resSeconds = resultDate.getSeconds();
            const ampm = resHours >= 12 ? 'PM' : 'AM';
            
            resHours = resHours % 12;
            resHours = resHours ? resHours : 12; // Jam '0' dikonversi menjadi '12'
            
            const stringHours = resHours.toString().padStart(2, '0');
            const stringMinutes = resMinutes.toString().padStart(2, '0');
            const stringSeconds = resSeconds.toString().padStart(2, '0');
            const formattedTime = `${stringHours}:${stringMinutes}:${stringSeconds} ${ampm}`;

            // Tampilkan hasil ke layar
            document.getElementById('resDate').innerText = formattedDate;
            document.getElementById('resTime').innerText = formattedTime;
            
            // Trigger animasi kemunculan hasil
            const resultContainer = document.getElementById('resultContainer');
            resultContainer.classList.add('show');
            
            // Sedikit trik agar animasi fade in berjalan mulus setelah display block aktif
            setTimeout(() => {
                resultContainer.style.opacity = '1';
                resultContainer.style.transform = 'translateY(0)';
            }, 10);
        }
    </script>
</body>
</html>
